<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller - Emanuel</title>
    <style>
      :root { 
        --primary: #ffffff; 
        --accent: #d63031; 
        --overlay: rgba(0, 0, 0, 0.85); 
      }
      body {
        background-image: url('https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNms2dHR0d2cxYzJjYjl3NnJhdDdxYjF0Y3VvejJnNHVrbHR5ZXM3bCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/zwPRprvrP4Lm0/giphy.gif');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: var(--primary);
        font-family: 'Inter', sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        background: var(--overlay);
        padding: 50px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        max-width: 1000px;
        width: 95%;
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 40px;
        border: 1px solid rgba(214, 48, 49, 0.4);
        backdrop-filter: blur(8px);
      }
      .info-section h1 { font-size: 2.8rem; margin-top: 0; color: var(--accent); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
      
      .profile-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        border-left: 2px solid #444;
        padding-left: 30px;
        perspective: 1000px; /* Importante para el efecto 3D del giro */
      }
      /* --- MONEDA (FLIP CARD) AUTOMÁTICA --- */
      .flip-card {
        width: 220px;
        height: 220px;
        position: relative;
        transform-style: preserve-3d;
        cursor: pointer;
        /* Transición lenta para el cambio automático */
        transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        /* Animación automática cada 3 segundos */
        animation: flip-auto 3s infinite alternate;
      }
      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 20px;
        border: 4px solid var(--accent);
        object-fit: cover;
      }
      .card-back {
        transform: rotateY(180deg);
      }
      /* Definición de la animación de giro automático */
      @keyframes flip-auto {
        0% { transform: rotateY(0deg); } /* Lado A (Eren) */
        100% { transform: rotateY(180deg); } /* Lado B (Emanuel Real) */
      }
      /* --------------------------- */

      .badge {
        background: var(--accent);
        color: white;
        padding: 8px 20px;
        border-radius: 25px;
        font-size: 0.9rem;
        margin-top: 15px;
        font-weight: bold;
      }
      h2 {
        font-size: 1.4rem;
        text-transform: uppercase;
        border-bottom: 3px solid var(--accent);
        display: inline-block;
        margin-bottom: 20px;
        margin-top: 30px;
      }
      ul, ol { list-style: none; padding: 0; }
      li { padding: 10px 0; border-bottom: 1px solid #333; font-size: 1.1rem; }
      li::before { content: "⚔️"; margin-right: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-section">
            <h1>Información Personal</h1>
            <p style="font-size: 1.2rem;"><strong>Nombre:</strong> Emanuel David Perez Olaya</p>
            <p style="font-size: 1.2rem;"><strong>Semestre:</strong> 2026-1</p>
            
            <h2>Mis Hobbies</h2>
            <ul>
                <li>Futbol</li><li>Musica</li><li>Boxeo</li><li>Gaming</li><li>Viajes</li><li>Anime</li>
            </ul>

            <h2>Series Favoritas</h2>
            <ol>
                <li>Attack on Titan</li><li>Sabuesos</li><li>Bienvenidos a Derry</li><li>Heroe debil</li><li>The Boys</li>
            </ol>
        </div>

        <div class="profile-box">
            <div class="flip-card">
                <img src="https://media1.tenor.com/m/1rXY1KhLvzAAAAAd/eren.gif" class="card-face card-front" alt="Eren">
                
                <img src="https://i.ibb.co/XZwXR2Nd/Whats-App-Image-2026-03-02-at-8-11-14-PM.jpg" class="card-face card-back" alt="Emanuel Real">
            </div>
            
            <div class="badge">ESTUDIANTE</div>
            <p style="font-size: 0.9rem; color: #b2bec3; text-align: center; margin-top: 15px; font-style: italic;">
                "No soy otaku"
            </p>
        </div>
    </div>
</body>
</html>
